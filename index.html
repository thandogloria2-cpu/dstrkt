        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (args[0].includes('failed to connect to websocket') || args[0].includes('WebSocket closed without opened'))) {
            return;
          }
          originalError.apply(console, args);
        };
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && event.reason.message && (event.reason.message.includes('WebSocket closed without opened') || event.reason.message.includes('failed to connect to websocket'))) {
            event.preventDefault();
          }
        });
      })();
